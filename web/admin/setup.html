<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSI Nexus - Initialize Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        :root { --nexus-primary: #020617; --nexus-accent: #6366f1; --background: #f8fafc; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            background-image: radial-gradient(circle at 2px 2px, #e2e8f0 1px, transparent 0);
            background-size: 40px 40px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .setup-card {
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
            border-top: 4px solid var(--nexus-accent);
            background-color: white;
        }
        .input-focus:focus {
            border-color: var(--nexus-accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }
        .animated-button {
            background-color: var(--nexus-primary); color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .animated-button:hover:not(:disabled) {
            background-color: #0f172a;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.3);
        }
    </style>
</head>
<body>

<div id="loadingScreen" class="text-slate-400 text-xs font-bold tracking-widest uppercase">Checking platform status...</div>

<div id="setupContainer" class="hidden w-full max-w-2xl p-12 rounded-3xl setup-card border border-slate-100 m-4">
    <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-950 rounded-2xl mb-6 shadow-xl">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
        </div>
        <h1 class="text-3xl font-black text-slate-950 tracking-tight">TSI Nexus</h1>
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-2">Powering Institutional Intelligence</p>
        <h2 class="text-base font-bold text-slate-500 mt-2 tracking-wide">Platform Setup</h2>
    </div>

    <div id="setup-feedback" class="hidden p-4 mb-8 rounded-xl text-center text-[10px] font-black uppercase tracking-wider"></div>

    <form id="setupForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="md:col-span-2">
            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Institution Name</label>
            <input type="text" id="instName" required
                class="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none transition-all text-sm font-semibold input-focus"
                placeholder="e.g. TSI Coop">
        </div>

        <div>
            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Admin Name</label>
            <input type="text" id="adminName" required
                class="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none transition-all text-sm font-semibold input-focus"
                placeholder="Full Name">
        </div>

        <div>
            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Admin Email</label>
            <input type="email" id="adminEmail" required
                class="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none transition-all text-sm font-semibold input-focus"
                placeholder="admin@yourorg.org">
        </div>

        <div>
            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Password</label>
            <input type="password" id="password" required minlength="8"
                class="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none transition-all text-sm font-semibold input-focus"
                placeholder="Min. 8 characters">
        </div>

        <div>
            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Confirm Password</label>
            <input type="password" id="confirmPassword" required
                class="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none transition-all text-sm font-semibold input-focus"
                placeholder="Repeat password">
        </div>

        <div class="md:col-span-2 mt-4">
            <button type="submit" id="setupBtn"
                class="animated-button w-full py-5 rounded-2xl font-bold text-xs uppercase tracking-[0.3em] shadow-lg disabled:opacity-50">
                Initialize Platform
            </button>
        </div>
    </form>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const loading  = document.getElementById('loadingScreen');
        const container = document.getElementById('setupContainer');

        // Probe: if already initialized, redirect to login
        try {
            const res  = await fetch('/api/setup', { method: 'GET' });
            const data = await res.json();
            if (data.initialized) {
                window.location.href = 'index.html';
                return;
            }
        } catch (err) {
            // Server not reachable — show the form anyway
        }

        loading.classList.add('hidden');
        container.classList.remove('hidden');

        /* ── form submission ─────────────────────────────────────────────── */

        const form     = document.getElementById('setupForm');
        const btn      = document.getElementById('setupBtn');
        const feedback = document.getElementById('setup-feedback');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirm  = document.getElementById('confirmPassword').value;

            if (password !== confirm) {
                showError('Passwords do not match');
                return;
            }
            if (password.length < 8) {
                showError('Password must be at least 8 characters');
                return;
            }

            btn.disabled  = true;
            btn.innerText = 'INITIALIZING FOUNDATION...';
            feedback.classList.add('hidden');

            try {
                const res = await fetch('/api/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        institution_name: document.getElementById('instName').value.trim(),
                        admin_name:       document.getElementById('adminName').value.trim(),
                        admin_email:      document.getElementById('adminEmail').value.trim().toLowerCase(),
                        password
                    })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    btn.innerText = 'SETUP COMPLETE';
                    btn.className = 'w-full py-5 bg-green-600 text-white rounded-2xl font-bold text-xs uppercase tracking-[0.3em] shadow-lg';
                    setTimeout(() => { window.location.href = 'index.html'; }, 1200);
                } else {
                    throw new Error(data.message || 'Initialization failed');
                }
            } catch (err) {
                showError(err.message);
                btn.disabled  = false;
                btn.innerText = 'Initialize Platform';
            }
        });

        function showError(msg) {
            feedback.textContent = msg;
            feedback.className = 'p-4 mb-8 rounded-xl text-center text-[10px] font-black uppercase bg-red-50 text-red-600 border border-red-100 block';
        }
    });
</script>

</body>
</html>
