<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSI Nexus | Liquid Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth transition for adaptive height changes */
        #liquid-stage { transition: all 0.3s ease-in-out; }
        .component-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen">

    <header class="border-b border-slate-800 p-4 flex justify-between items-center bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
            <h1 class="text-sm font-bold tracking-widest uppercase text-slate-400">TSI Nexus // Sovereign Core</h1>
        </div>
        <div id="connection-status" class="text-xs text-slate-500 italic">Institutional Memory Active</div>
    </header>

    <main class="container mx-auto max-w-4xl px-4 py-12">
        
        <div class="relative group mb-12">
            <div class="absolute -inset-1 bg-gradient-to-r from-blue-600 to-cyan-500 rounded-xl blur opacity-25 group-focus-within:opacity-50 transition duration-1000"></div>
            <input type="text" id="command-k" 
                   class="relative w-full bg-slate-900 border border-slate-700 p-6 rounded-xl text-2xl font-light outline-none focus:border-blue-500 transition-all placeholder:text-slate-600"
                   placeholder="Enter intent (e.g., /check @machine_01)..."
                   autocomplete="off">
            <div class="absolute right-6 top-7 text-slate-500 text-sm hidden md:block">Press <kbd class="bg-slate-800 px-1 rounded border border-slate-600">Enter</kbd> to Execute</div>
        </div>

        <div id="liquid-stage" class="space-y-6">
            <div class="text-center py-20 border-2 border-dashed border-slate-800 rounded-2xl">
                <p class="text-slate-500">Nexus is idle. Define your intent to generate an interface.</p>
            </div>
        </div>
    </main>

    <template id="tpl-twin_context_card">
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 component-fade-in shadow-xl">
            <div class="flex justify-between items-start mb-4">
                <h3 class="text-blue-400 font-mono text-sm uppercase tracking-tighter">Digital Twin State</h3>
                <span class="text-xs bg-slate-800 px-2 py-1 rounded text-slate-400">Verified</span>
            </div>
            <div id="twin-data-payload" class="grid grid-cols-2 gap-4">
                </div>
        </div>
    </template>

    <template id="tpl-policy_validation_form">
        <div class="bg-amber-900/20 border border-amber-500/50 rounded-xl p-6 component-fade-in">
            <h3 class="text-amber-500 font-bold mb-2">⚠️ Policy Guard Review Required</h3>
            <p id="policy-reason" class="text-sm text-slate-300 mb-4"></p>
            <div class="flex space-x-3">
                <button onclick="executeAction('PROCEED')" class="bg-amber-600 hover:bg-amber-500 text-white px-4 py-2 rounded text-sm font-bold transition">Confirm Authorization</button>
                <button onclick="executeAction('CANCEL')" class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-4 py-2 rounded text-sm transition">Abort</button>
            </div>
        </div>
    </template>

    <script>
        const input = document.getElementById('command-k');
        const stage = document.getElementById('liquid-stage');

        // 1. Listen for Intent
        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const intent = input.value;
                input.value = '';
                await resolveIntent(intent);
            }
        });

        // 2. Resolve Intent via Nexus Java Backend (Intent.java)
        async function resolveIntent(intent) {
            stage.innerHTML = '<div class="text-center py-10 animate-pulse text-blue-500">Nexus Reasoning...</div>';
            
            try {
                const response = await fetch('/api/intent', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-DX-FUNCTION': 'resolve_intent'
                    },
                    body: JSON.stringify({ intent: intent })
                });

                const data = await response.json();
                renderAdaptiveUI(data.components);
            } catch (err) {
                stage.innerHTML = `<div class="p-4 bg-red-900/30 border border-red-500 text-red-200 rounded">Connection Error: ${err.message}</div>`;
            }
        }

        // 3. Render the A2UI Components sent by Java
        function renderAdaptiveUI(components) {
            stage.innerHTML = ''; // Clear stage
            
            components.forEach(comp => {
                const template = document.getElementById(`tpl-${comp.component_type}`);
                if (template) {
                    const clone = template.content.cloneNode(true);
                    
                    // Populate data based on component type
                    if (comp.component_type === 'twin_context_card') {
                        const props = JSON.parse(comp.props);
                        clone.querySelector('#twin-data-payload').innerHTML = `
                            <div><p class="text-xs text-slate-500">Entity</p><p class="font-mono">${props.target}</p></div>
                            <div><p class="text-xs text-slate-500">Status</p><p class="text-emerald-400">Operational</p></div>
                        `;
                    }
                    
                    if (comp.component_type === 'policy_validation_form') {
                        const props = JSON.parse(comp.props);
                        clone.querySelector('#policy-reason').innerText = `Intent detected: "${props.intent}". This exceeds standard threshold.`;
                    }

                    stage.appendChild(clone);
                }
            });
        }

        async function executeAction(type) {
            alert(`Governance signal sent: ${type}`);
            stage.innerHTML = '<div class="text-center text-slate-500 mt-20">Nexus is idle. Waiting for intent...</div>';
        }
    </script>
</body>
</html>
