<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid | TSI Nexus - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        :root { 
            --nexus-primary: #4f46e5; 
            --nexus-accent: #ea580c; 
            --background: #f8fafc; 
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            background-image: radial-gradient(circle at 2px 2px, #e2e8f0 1px, transparent 0);
            background-size: 40px 40px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .nexus-card {
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1);
            background-color: white; z-index: 10; position: relative;
            overflow: hidden;
            border-radius: 2rem;
        }
        .accent-bar {
            height: 4px;
            background: linear-gradient(90deg, #4f46e5, #ea580c, #059669);
            width: 100%;
        }
        .input-focus:focus {
            border-color: var(--nexus-primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }
        .logo-blob {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #4f46e5, #ea580c);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: morph 6s ease-in-out infinite;
            box-shadow: 0 0 16px rgba(79,70,229,0.28);
        }
        @keyframes morph {
            0%,100% { border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; }
            50%      { border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; }
        }
    </style>
</head>
<body>

<div class="w-full max-w-md nexus-card border border-slate-100">
    <div class="accent-bar"></div>
    <div class="p-12">
        <div class="text-center mb-12">
            <div class="flex justify-center mb-6">
                <div class="logo-blob"></div>
            </div>
            <h2 class="text-3xl font-black text-slate-950 tracking-tight">Liquid</h2>
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-2">Adaptive Interface for Company Brain</p>
        </div>

        <div id="nexus-feedback" class="hidden p-4 mb-8 rounded-xl text-center text-[10px] font-black uppercase tracking-wider"></div>

        <form class="space-y-6" id="nexusLoginForm">
            <div>
                <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Institutional Email</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none transition-all text-sm input-focus"
                    placeholder="officer@tsicoop.org">
            </div>
            <div>
                <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Password</label>
                <input type="password" id="password" required
                    class="w-full px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none transition-all text-sm input-focus"
                    placeholder="••••••••••••">
            </div>
            <button type="submit" id="nexusBtn"
                class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold text-xs uppercase tracking-[0.3em] shadow-lg mt-4 hover:bg-indigo-700 transition-all disabled:opacity-50">
                Sign In
            </button>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        // Redirect if already authenticated
        const existingToken = localStorage.getItem('nexus_token');
        if (existingToken) {
            window.location.href = 'liquid.html';
            return;
        }

        const form     = document.getElementById('nexusLoginForm');
        const btn      = document.getElementById('nexusBtn');
        const feedback = document.getElementById('nexus-feedback');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true;
            btn.innerText = 'AUTHENTICATING...';
            feedback.classList.add('hidden');

            try {
                const res  = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    localStorage.setItem('nexus_token', data.token);
                    localStorage.setItem('nexus_user',  JSON.stringify({ name: data.name, role: data.role, email }));
                    btn.innerText = 'AUTHORIZED';
                    btn.style.backgroundColor = '#059669';
                    setTimeout(() => { window.location.href = 'liquid.html'; }, 500);
                } else {
                    throw new Error(data.message || 'Access denied');
                }
            } catch (err) {
                feedback.textContent = err.message;
                feedback.className = 'p-4 mb-8 rounded-xl text-center text-[10px] font-black uppercase bg-red-50 text-red-600 border border-red-100 block';
                btn.disabled = false;
                btn.innerText = 'Sign In';
            }
        });
    });
</script>

</body>
</html>
