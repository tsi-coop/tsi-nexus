<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid | Adaptive Enterprise Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --liquid-blue: #3b82f6; 
            --nexus-dark: #0f172a;  
            --tsi-yellow: #ffca28;  
            --tsi-red: #ef5350;     
        }
        body { 
            background-color: #f8fafc; 
            color: var(--nexus-dark); 
            background-image: radial-gradient(#e2e8f0 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        .liquid-logo {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, var(--liquid-blue), #60a5fa);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: morph 6s ease-in-out infinite;
            border: 2px solid white;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.25);
        }
        @keyframes morph {
            0%, 100% { border-radius: 40% 60% 70% 30% / 40% 40% 60% 50%; }
            50% { border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; }
        }
        .nexus-border {
            border-left: 8px solid var(--liquid-blue);
            border-right: 1px solid #e2e8f0; border-top: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0;
        }
        .component-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .accent-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        
        /* Premium Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="font-sans antialiased min-h-screen">

    <header class="max-w-4xl mx-auto px-4 pt-16 pb-12 flex flex-col items-center text-center">
        <div class="liquid-logo mb-6"></div>
        <h1 class="text-5xl font-black tracking-tighter text-slate-900 italic leading-none mb-4">Liquid</h1>
        <p class="text-slate-500 text-xs font-black tracking-[0.2em] uppercase max-w-md border-y border-slate-200 py-4">
            Adaptive Interface for Intelligent Enterprise
        </p>
    </header>

    <main class="container mx-auto max-w-2xl px-4">
        <div class="relative mb-16">
            <div class="absolute -left-3 top-0 bottom-0 w-1.5 bg-blue-500 rounded-l-lg shadow-[0_0_15px_rgba(59,130,246,0.4)]"></div>
            <input type="text" id="command-k" 
                   class="w-full bg-white border border-slate-200 p-8 rounded-2xl text-2xl font-light outline-none focus:ring-8 focus:ring-blue-500/5 focus:border-blue-500 transition-all placeholder:text-slate-300 shadow-xl shadow-slate-200/40"
                   placeholder="Express Intent..."
                   autocomplete="off">
            <div class="absolute right-8 top-1/2 -translate-y-1/2 flex items-center space-x-3">
                <span class="accent-dot bg-[--tsi-yellow]"></span>
                <span class="accent-dot bg-[--tsi-red]"></span>
                <span class="text-[10px] font-black text-slate-400 tracking-widest uppercase ml-3">Nexus Active</span>
            </div>
        </div>

        <div id="liquid-stage" class="space-y-10 pb-32">
            <div class="text-center py-24 opacity-20">
                <div class="inline-block border-2 border-slate-300 rounded-full px-8 py-2">
                    <p class="text-[10px] uppercase tracking-[0.5em] font-black text-slate-500">Awaiting Signal</p>
                </div>
            </div>
        </div>
    </main>

    <template id="tpl-universal_context_card">
        <div class="bg-white nexus-border rounded-2xl p-10 shadow-lg component-fade-in">
            <div class="flex justify-between items-start mb-10">
                <div>
                    <h2 class="target-handle text-3xl font-black text-slate-900 tracking-tight mb-1">@target</h2>
                    <div class="flex items-center space-x-2">
                        <span class="twin-type text-[11px] font-black uppercase tracking-[0.2em] text-blue-600">TYPE</span>
                        <span class="w-1 h-1 bg-slate-300 rounded-full"></span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">Sovereign Node</span>
                    </div>
                </div>
                <div class="h-12 w-12 bg-blue-50 rounded-2xl flex items-center justify-center border border-blue-100">
                    <div class="w-2.5 h-2.5 bg-blue-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(59,130,246,0.6)]"></div>
                </div>
            </div>
            <div class="state-grid grid grid-cols-2 gap-y-10 gap-x-8 mb-12"></div>
            <div class="bg-slate-50/80 rounded-2xl p-6 border border-slate-100 mb-4">
                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.25em] mb-5">Graph Topology</h4>
                <div class="graph-links flex flex-wrap gap-3"></div>
            </div>
            <div class="interaction-stream-wrap hidden bg-slate-50/80 rounded-2xl p-6 border border-slate-100">
                <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.25em] mb-5">Interaction Stream</h4>
                <div class="interaction-stream space-y-4"></div>
            </div>
        </div>
    </template>

    <template id="tpl-universal_action_confirm">
        <div class="bg-slate-900 text-white rounded-3xl p-12 shadow-2xl component-fade-in relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-400 via-blue-600 to-indigo-600"></div>
            <h3 class="text-blue-400 font-black text-[11px] uppercase tracking-[0.5em] mb-6">Governance Handshake</h3>
            <p class="action-desc text-3xl font-light leading-tight mb-12 text-slate-100">Proposed action...</p>
            <div class="flex items-center space-x-8">
                <button class="exec-btn bg-blue-600 text-white px-12 py-5 rounded-2xl text-sm font-black hover:bg-blue-500 transition-all shadow-xl shadow-blue-500/20">Authorize Mutation</button>
                <button onclick="this.closest('.component-fade-in').remove()" class="text-slate-500 text-xs font-black uppercase tracking-widest hover:text-white transition-colors">Dismiss</button>
            </div>
        </div>
    </template>

    <script>
        const input = document.getElementById('command-k');
        const stage = document.getElementById('liquid-stage');

        input.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && input.value.trim()) {
                const val = input.value;
                input.value = '';
                await resolveIntent(val);
            }
        });

        async function resolveIntent(intent) {
            stage.innerHTML = '<div class="text-center py-16 animate-pulse text-blue-600 text-[11px] font-black tracking-[0.4em]">RESOLVING INTENT...</div>';
            try {
                const response = await fetch('/api/intent', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ intent: intent })
                });
                const data = await response.json();
                renderAdaptiveUI(data.components);
            } catch (err) {
                stage.innerHTML = `<div class="p-8 bg-red-50 text-red-700 border-l-8 border-red-500 rounded-xl shadow-lg font-bold">Nexus Connection Failed</div>`;
            }
        }

        const safeSet = (el, val, mode = 'text') => {
            if (!el) return;
            if (mode === 'html') el.innerHTML = val;
            else el.innerText = val;
        };

        async function renderAdaptiveUI(components) {
            stage.innerHTML = ''; 
            for (const comp of components) {
                const template = document.getElementById(`tpl-${comp.component_type}`);
                if (!template) continue;

                const clone = template.content.cloneNode(true);
                const container = clone.querySelector('div'); 
                const props = JSON.parse(comp.props);

                if (comp.component_type === 'universal_context_card') {
                    safeSet(container.querySelector('.target-handle'), props.target);

                    try {
                        const resCtx = await fetch('/api/context', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ external_id: props.target })
                        });
                        const data = await resCtx.json();
                        const ctx = data.context;

                        safeSet(container.querySelector('.twin-type'), ctx.type);
                        
                        const state = typeof ctx.state === 'string' ? JSON.parse(ctx.state) : ctx.state;
                        const gridHtml = Object.entries(state).map(([k, v]) => `
                            <div class="group">
                                <p class="text-[10px] uppercase font-black text-slate-300 tracking-widest mb-2 group-hover:text-blue-500 transition-colors">${k}</p>
                                <p class="text-lg font-bold text-slate-800">${v}</p>
                            </div>
                        `).join('');
                        safeSet(container.querySelector('.state-grid'), gridHtml, 'html');

                        const links = typeof ctx.graph_links === 'string' ? JSON.parse(ctx.graph_links) : ctx.graph_links;
                        if(links && links.length > 0) {
                            const linksHtml = links.map(l => `
                                <span class="bg-white border border-slate-200 text-slate-600 text-[10px] font-black px-4 py-2 rounded-xl shadow-sm hover:border-blue-300 transition-colors">
                                    ${l.type} <span class="text-blue-500 mx-1">→</span> ${l.to}
                                </span>
                            `).join('');
                            safeSet(container.querySelector('.graph-links'), linksHtml, 'html');
                        }
                        const interactions = ctx.recent_interactions;
                        if (interactions && interactions.length > 0) {
                            const streamHtml = interactions.map(i => `
                                <div class="flex items-start gap-4">
                                    <span class="text-[10px] font-black text-slate-300 whitespace-nowrap pt-0.5 w-20 shrink-0">${new Date(i.timestamp).toLocaleDateString('en-GB', {day:'2-digit', month:'short'})}</span>
                                    <span class="text-sm text-slate-600 leading-snug">${i.content}</span>
                                </div>`).join('');
                            safeSet(container.querySelector('.interaction-stream'), streamHtml, 'html');
                            container.querySelector('.interaction-stream-wrap').classList.remove('hidden');
                        }
                    } catch (e) { console.error("Context Error", e); }
                    
                } else if (comp.component_type === 'universal_action_confirm') {
                    // Logic to display relevant labels based on action type
                    if (props.action_type === 'COMPARE') {
                        safeSet(container.querySelector('.action-desc'), `Benchmark ${props.target_1} against ${props.target_2}?`);
                    } else {
                        safeSet(container.querySelector('.action-desc'), `Execute ${props.action_type} for ${props.target_external_id} with value "${props.value}"?`);
                    }
                    
                    const execBtn = container.querySelector('.exec-btn');
                    if (execBtn) execBtn.onclick = () => finalizeAction(props);
                }

                stage.appendChild(clone);
            }
        }

        function renderAnalysisData(data, actionType) {
            if (!data || data.length === 0) return '<p class="text-slate-400 italic text-sm">No data returned for this entity.</p>';
            if (actionType === 'ANALYZE') {
                const row = data[0];
                return Object.entries(row).filter(([k]) => k !== 'external_id').map(([k, v]) => `
                    <div class="flex justify-between items-center py-4 border-b border-slate-100 last:border-0">
                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">${k.replace(/_/g, ' ')}</span>
                        <span class="text-2xl font-black text-slate-800">${v ?? '—'}${k.includes('rate') ? '%' : ''}</span>
                    </div>`).join('');
            }
            if (actionType === 'COMPARE') {
                const cols = Object.keys(data[0]).filter(k => k !== 'external_id');
                return `<table class="w-full text-sm">
                    <thead><tr>
                        <th class="text-left text-[10px] font-black uppercase tracking-widest text-slate-400 pb-3">Entity</th>
                        ${cols.map(c => `<th class="text-right text-[10px] font-black uppercase tracking-widest text-slate-400 pb-3">${c.replace(/_/g, ' ')}</th>`).join('')}
                    </tr></thead>
                    <tbody>${data.map(row => `
                        <tr class="border-t border-slate-100">
                            <td class="py-3 font-bold text-slate-700">${row.external_id}</td>
                            ${cols.map(c => `<td class="py-3 text-right font-black text-slate-800">${row[c] ?? '—'}${c.includes('rate') ? '%' : ''}</td>`).join('')}
                        </tr>`).join('')}
                    </tbody></table>`;
            }
            return '';
        }

        async function finalizeAction(props) {
            stage.innerHTML = '<div class="text-center py-24 animate-pulse text-blue-600 text-[11px] font-black tracking-[0.6em]">GOVERNANCE CHECK</div>';
            
            // Critical Fix: Aligning parameters to match Governance.java expectations
            const requestBody = {
                action_type: props.action_type,
                intent_raw: props.intent_raw,
                params: {
                    target_external_id: props.target_external_id, 
                    target_1: props.target_1,
                    target_2: props.target_2,
                    new_data: props.value ? { [props.action_type.toLowerCase() + "_amount"]: props.value } : null
                }
            };

            try {
                const res = await fetch('/api/governance', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestBody)
                });
                
                const result = await res.json();
                
                if(result.success) {
                    stage.innerHTML = `<div class="p-20 bg-white border border-blue-100 rounded-3xl text-center component-fade-in shadow-2xl">
                        <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
                            <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <p class="font-black text-2xl text-slate-900 tracking-tight mb-2 text-blue-600">
                            ${(props.action_type === 'ANALYZE' || props.action_type === 'COMPARE') ? 'Analysis Generated' : 'Mutation Authorized'}
                        </p>
                        <div class="text-slate-700 font-medium mt-6 bg-slate-50 p-6 rounded-xl border border-slate-100 shadow-inner">
                           ${result.data ? renderAnalysisData(result.data, props.action_type) : (result.reason || result.message)}
                        </div>
                    </div>`;
                    
                    if (props.action_type === 'DISBURSE') {
                        setTimeout(() => resolveIntent(`@${props.target_external_id.replace(/^@/, '')}`), 3500);
                    }
                } else {
                    stage.innerHTML = `<div class="p-12 border-l-[12px] border-red-500 bg-white text-slate-900 rounded-2xl component-fade-in shadow-2xl">
                        <h4 class="text-red-600 font-black text-[11px] uppercase tracking-[0.4em] mb-4">Governance Denial</h4>
                        <p class="text-xl font-bold leading-tight text-slate-800">${result.reason}</p>
                        <div class="mt-10 pt-6 border-t border-slate-100">
                            <button onclick="location.reload()" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-blue-600 transition-colors">Clear Logic Fault</button>
                        </div>
                    </div>`;
                }
            } catch (err) { 
                stage.innerHTML = `<div class="p-8 bg-red-50 text-red-600 rounded-2xl text-sm font-bold">Nexus Error: ${err.message}</div>`; 
            }
        }
    </script>
</body>
</html>
